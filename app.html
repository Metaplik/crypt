<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRYPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --g0: #000a00;
            --g1: #001500;
            --g2: #002800;
            --neon: #00ff41;
            --neon2: #00cc33;
            --neon-dim: #006618;
            --neon-glow: rgba(0,255,65,0.18);
            --neon-glow2: rgba(0,255,65,0.07);
            --red: #ff2a2a;
            --metal1: #1a2e1a;
            --metal2: #0d1f0d;
            --glass: rgba(0,20,0,0.72);
            --glass2: rgba(0,40,0,0.45);
            --border: rgba(0,255,65,0.28);
            --border2: rgba(0,255,65,0.12);
            --txt: #b8ffca;
            --txt2: #6aff8e;
            --scan: rgba(0,255,65,0.025);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            background: #000;
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #matrix {
            position: fixed; inset: 0;
            z-index: 0;
            opacity: 0.55;
        }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                var(--scan) 2px,
                var(--scan) 4px
            );
            pointer-events: none;
        }

        .panel {
            position: relative; z-index: 2;
            width: 100%; max-width: 400px;
            max-height: 97vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 18px 18px;
            background:
                linear-gradient(145deg, rgba(0,35,0,0.88) 0%, rgba(0,10,0,0.96) 60%),
                radial-gradient(ellipse at 30% 0%, rgba(0,255,65,0.08) 0%, transparent 60%);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow:
                0 0 0 1px var(--border2),
                0 0 40px rgba(0,255,65,0.12),
                0 0 120px rgba(0,255,65,0.04),
                inset 0 1px 0 rgba(0,255,65,0.15),
                inset 0 -1px 0 rgba(0,255,65,0.06);
        }

        .panel::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--neon2) 30%, #7fffaa 50%, var(--neon2) 70%, transparent 100%);
            border-radius: 18px 18px 0 0;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); border-radius: 2px; }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
            gap: 6px;
        }

        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #7fffaa 0%, var(--neon) 40%, var(--neon2) 75%, #004d15 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(0,255,65,0.6));
            animation: logopulse 3s ease-in-out infinite;
        }

        @keyframes logopulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0,255,65,0.5)); }
            50%       { filter: drop-shadow(0 0 22px rgba(0,255,65,0.9)) drop-shadow(0 0 40px rgba(0,255,65,0.3)); }
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        input[type=text] {
            flex: 1;
            padding: 10px 14px;
            background: rgba(0,255,65,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--neon);
            font-size: 17px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type=text]:focus {
            border-color: var(--neon);
            box-shadow: 0 0 0 2px rgba(0,255,65,0.12), inset 0 0 10px rgba(0,255,65,0.04);
        }
        input[type=text]::placeholder { color: var(--neon-dim); opacity: 0.7; letter-spacing: 1px; }

        .btn-join {
            padding: 10px 18px;
            background: linear-gradient(135deg, rgba(0,255,65,0.1), rgba(0,255,65,0.04));
            border: 1px solid var(--neon2);
            border-radius: 8px;
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            box-shadow: 0 0 12px rgba(0,255,65,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .btn-join:active {
            background: rgba(0,255,65,0.22);
            box-shadow: 0 0 20px rgba(0,255,65,0.35);
            transform: scale(0.97);
        }

        .section-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--neon-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 6px var(--neon);
            animation: blink 1.4s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .connected-list {
            background: rgba(0,255,65,0.03);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 8px 12px;
            max-height: 64px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--txt2);
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .push-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 12px 0;
        }

        .pill-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 58px;
            height: 58px;
            border-radius: 14px;
            background: linear-gradient(145deg, rgba(0,40,0,0.9), rgba(0,20,0,0.95));
            border: 1px solid var(--border);
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow:
                0 4px 15px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(0,255,65,0.12),
                inset 0 -1px 0 rgba(0,0,0,0.3);
            gap: 4px;
        }
        .pill-btn i { font-size: 18px; }
        .pill-btn:active { transform: scale(0.94); background: rgba(0,255,65,0.08); }
        .pill-btn.active {
            border-color: var(--red);
            color: var(--red);
            box-shadow:
                0 4px 15px rgba(0,0,0,0.5),
                0 0 12px rgba(255,42,42,0.25),
                inset 0 1px 0 rgba(255,42,42,0.12);
        }

        #talkBtnWrapper {
            position: relative;
            width: 116px;
            height: 116px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .push-glow-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0%,
                rgba(0,255,65,0.0) 20%,
                rgba(0,255,65,0.9) 35%,
                rgba(0,255,65,1) 50%,
                rgba(0,255,65,0.9) 65%,
                rgba(0,255,65,0.0) 80%,
                transparent 100%
            );
            animation: spinring 2.4s linear infinite;
            filter: blur(1px);
        }

        .push-glow-mask {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--g0);
            z-index: 1;
        }

        @keyframes spinring {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        #talkBtn {
            position: relative;
            z-index: 2;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            padding: 0;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            transition: transform 0.08s;
        }

        #talkBtn svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            filter: drop-shadow(0 4px 18px rgba(0,255,65,0.3)) drop-shadow(0 0 6px rgba(0,180,40,0.5));
            transition: filter 0.1s;
        }

        #talkBtn.pressing { transform: scale(0.91); }
        #talkBtn.pressing svg {
            filter: drop-shadow(0 0 28px rgba(0,255,65,0.9)) drop-shadow(0 0 8px rgba(0,255,65,0.8)) brightness(1.2);
        }

        #timerPopup {
            position: absolute;
            top: -44px;
            left: 50%;
            transform: translateX(-50%) scale(0.75);
            background: rgba(0,20,0,0.92);
            border: 1px solid var(--neon2);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            color: var(--neon);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            z-index: 10;
            box-shadow: 0 0 14px rgba(0,255,65,0.35);
            letter-spacing: 2px;
        }
        #timerPopup.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        #timerPopup.sending {
            animation: snapSend 0.45s ease-out forwards;
        }
        @keyframes snapSend {
            0%   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
            60%  { opacity: 0.6; transform: translateX(-50%) scale(1.15) translateY(-16px); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(-36px); }
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 10px 0 8px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .action-icon {
            width: 54px; height: 54px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(0,50,0,0.9), rgba(0,20,0,0.95));
            border: 1px solid var(--border);
            color: var(--neon);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(0,255,65,0.1);
        }
        .action-btn:active .action-icon {
            transform: scale(0.92);
            background: rgba(0,255,65,0.15);
            box-shadow: 0 0 24px rgba(0,255,65,0.4), inset 0 1px 0 rgba(0,255,65,0.2);
        }
        .action-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--neon-dim);
            text-transform: uppercase;
        }

        #status {
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--txt2);
            min-height: 28px;
            padding: 4px 0;
            margin: 2px 0 8px;
        }

        /* ===== VIDEO PANEL - FIXED ===== */
        #videoPanel {
            display: none;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 20px rgba(0,255,65,0.1);
            /* Half screen height approx */
            height: 50vh;
            min-height: 260px;
        }

        /* Multi-participant grid */
        #remoteVideosGrid {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 2px;
            background: #000;
        }

        /* Grid layouts depending on participant count */
        #remoteVideosGrid.count-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        #remoteVideosGrid.count-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        #remoteVideosGrid.count-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #remoteVideosGrid.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

        .remote-video-wrap {
            position: relative;
            background: #0a150a;
            overflow: hidden;
        }
        .remote-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .remote-video-label {
            position: absolute;
            bottom: 4px; left: 6px;
            font-size: 9px;
            color: var(--neon);
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 6px var(--neon);
            background: rgba(0,0,0,0.5);
            padding: 1px 5px;
            border-radius: 4px;
        }

        #localVideo {
            position: absolute; bottom: 8px; right: 8px;
            width: 76px; height: 56px;
            object-fit: cover;
            border: 1px solid var(--neon2);
            border-radius: 8px;
            background: #111;
            z-index: 5;
        }
        .video-label {
            position: absolute; top: 8px; left: 10px;
            font-size: 11px;
            color: var(--neon);
            letter-spacing: 3px;
            text-shadow: 0 0 8px var(--neon);
            font-family: 'Orbitron', sans-serif;
            z-index: 5;
        }

        /* Flip camera button */
        #flipCameraBtn {
            position: absolute;
            bottom: 8px; left: 8px;
            z-index: 6;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(0,20,0,0.85);
            border: 1px solid var(--border);
            color: var(--neon);
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }
        #flipCameraBtn:active {
            background: rgba(0,255,65,0.2);
            transform: scale(0.9) rotate(180deg);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0 8px;
        }
        .divider-line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .divider-text {
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--neon-dim);
            text-transform: uppercase;
        }

        .messages-box {
            background: rgba(0,255,65,0.02);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .msg-bubble {
            max-width: 86%;
            padding: 7px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.35;
            word-break: break-word;
            font-family: 'Share Tech Mono', monospace;
        }
        .msg-left {
            align-self: flex-start;
            background: rgba(0,255,65,0.06);
            border: 1px solid rgba(0,255,65,0.14);
            border-left: 2px solid var(--neon2);
            color: var(--txt);
        }
        .msg-right {
            align-self: flex-end;
            background: rgba(0,255,65,0.1);
            border: 1px solid rgba(0,255,65,0.2);
            border-right: 2px solid var(--neon);
            color: #e6fff0;
        }
        .msg-sender { font-size: 10px; opacity: 0.6; margin-bottom: 2px; letter-spacing: 1px; }
        .msg-time { font-size: 10px; text-align: right; margin-top: 3px; opacity: 0.4; }
        .msg-media img { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; border: 1px solid var(--border); }
        .msg-media video { max-width: 100%; border-radius: 8px; margin-top: 4px; border: 1px solid var(--border); }

        /* File download link */
        .msg-file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            padding: 6px 10px;
            background: rgba(0,255,65,0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--neon);
            font-size: 12px;
            text-decoration: none;
            letter-spacing: 1px;
            word-break: break-all;
        }
        .msg-file-link:hover { background: rgba(0,255,65,0.15); }

        .chat-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .chat-input-row input {
            flex: 1; margin: 0;
            padding: 9px 14px;
            font-size: 14px;
            background: rgba(0,255,65,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--neon);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .chat-input-row input:focus {
            border-color: var(--neon2);
            box-shadow: 0 0 0 2px rgba(0,255,65,0.08);
        }
        .chat-input-row input::placeholder { color: var(--neon-dim); opacity: 0.6; }

        .icon-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(0,40,0,0.8);
            border: 1px solid var(--border);
            color: var(--neon);
            font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.12s;
        }
        .icon-btn:active {
            background: rgba(0,255,65,0.15);
            box-shadow: 0 0 14px rgba(0,255,65,0.35);
            transform: scale(0.93);
        }

        /* Upload progress indicator */
        .upload-progress {
            font-size: 11px;
            color: var(--neon-dim);
            letter-spacing: 1px;
            text-align: center;
            padding: 3px 0;
        }

        #fileInput { display: none; }

        .footer-info {
            text-align: center;
            font-size: 9px;
            letter-spacing: 1.5px;
            color: var(--neon-dim);
            opacity: 0.7;
            margin-top: 12px;
            line-height: 1.6;
        }

        #lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.93); z-index: 9999;
            justify-content: center; align-items: center;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 95vw; max-height: 90vh; border: 1px solid var(--border); border-radius: 10px; }
        #lightbox-close {
            position: absolute; top: 16px; right: 20px;
            font-size: 28px; color: var(--neon); cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            opacity: 0.8;
        }

        #callPopup {
            display: none; position: fixed; inset: 0; z-index: 8888;
            background: rgba(0,0,0,0.88); justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        #callPopup.open { display: flex; }
        .call-box {
            background: linear-gradient(145deg, rgba(0,30,0,0.97), rgba(0,10,0,0.99));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 36px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,255,65,0.2), 0 0 0 1px var(--border2);
        }
        .call-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: var(--neon);
        }
        .call-box p { font-size: 14px; color: #5aff7e; margin-bottom: 22px; letter-spacing: 2px; }
        .call-actions { display: flex; gap: 14px; justify-content: center; }
        .call-accept {
            background: linear-gradient(135deg, rgba(0,255,65,0.15), rgba(0,120,30,0.1));
            border: 1px solid var(--neon2);
            color: var(--neon);
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .call-accept:active { background: rgba(0,255,65,0.25); box-shadow: 0 0 20px rgba(0,255,65,0.3); }
        .call-reject {
            background: linear-gradient(135deg, rgba(255,42,42,0.1), rgba(120,0,0,0.1));
            border: 1px solid rgba(255,42,42,0.5);
            color: var(--red);
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .call-reject:active { background: rgba(255,42,42,0.2); }
    </style>
</head>
<body>
<canvas id="matrix"></canvas>

<div id="lightbox">
    <span id="lightbox-close">✕</span>
    <img id="lightbox-img" src="" alt="photo">
</div>

<div id="callPopup">
    <div class="call-box">
        <h2 id="callPopupTitle">APPEL ENTRANT</h2>
        <p id="callPopupSender">De : ???</p>
        <div class="call-actions">
            <button class="call-accept" id="callAcceptBtn">ACCEPTER</button>
            <button class="call-reject" id="callRejectBtn">REFUSER</button>
        </div>
    </div>
</div>

<div class="panel">

    <div class="logo-wrap">
        <div>
            <svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>

<script>
// ===================== MATRIX =====================
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let width, height, columns, drops;
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+[]{};:<>?,./\\|'\"`~ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
function resizeMatrix() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    const colCount = Math.floor(width / 18) + 5;
    columns = colCount;
    drops = new Array(colCount).fill(0).map(() => Math.random() * -height);
}
function drawMatrix() {
    if (!ctx) return;
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = '#0f0'; ctx.font = '16px "Share Tech Mono", monospace';
    for (let i = 0; i < columns; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * 18, drops[i] * 18);
        if (drops[i] * 18 > height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
    requestAnimationFrame(drawMatrix);
}
window.addEventListener('resize', resizeMatrix);
resizeMatrix(); drawMatrix();

// ===================== SONS =====================
function playBeep(freq, duration, vol) {
    vol = vol || 0.2;
    try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator(), gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.frequency.value = freq; gain.gain.value = vol; osc.type = 'sine';
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
        osc.stop(ac.currentTime + duration);
        setTimeout(function(){ ac.close(); }, duration * 1000 + 100);
    } catch(e) {}
}
function playTalkieStart()  { playBeep(880, 0.08, 0.22); }
function playTalkieEnd()    { playBeep(660, 0.12, 0.22); }
function playSmsSent()      { playBeep(1200, 0.05, 0.18); setTimeout(function(){ playBeep(1500, 0.05, 0.18); }, 60); }
function playSmsReceived()  { playBeep(1000, 0.07, 0.16); setTimeout(function(){ playBeep(800, 0.09, 0.16); }, 100); }
function playCallRing()     { playBeep(440, 0.3, 0.25); setTimeout(function(){ playBeep(440, 0.3, 0.25); }, 500); }

// ===================== ETAT =====================

var mediaRecorder, audioChunks = [];

// ===================== CHRONOMÈTRE =====================
var timerInterval = null;
var timerSeconds = 0;
function formatTimer(s) {
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return '⏱ ' + m + ':' + (sec < 10 ? '0' : '') + sec;
}
function startTimer() {
    timerSeconds = 0;
    timerPopup.textContent = formatTimer(0);
    timerPopup.classList.remove('sending');
    timerPopup.classList.add('visible');
    timerInterval = setInterval(function() {
        timerSeconds++;
        timerPopup.textContent = formatTimer(timerSeconds);
    }, 1000);
}
function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerPopup.classList.remove('visible');
    timerPopup.classList.add('sending');
    setTimeout(function() {
        timerPopup.classList.remove('sending');
        timerSeconds = 0;
    }, 450);
}

// ===================== UI =====================
function updateList() {
    if (connections.length === 0) connectedListEl.innerHTML = "Aucun";
    else connectedListEl.innerHTML = connections.map(c => '▸ ' + c.peer.substring(0,16)).join('<br>');
}
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if(m==='&') return '&amp;';
        if(m==='<') return '&lt;';
        if(m==='>') return '&gt;';
        return m;
    });
}
function addMessageToChat(content, sender, isOwn, type) {
    isOwn = isOwn || false; type = type || 'text';
    var time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    var msgDiv = document.createElement('div');
    msgDiv.classList.add('msg-bubble', isOwn ? 'msg-right' : 'msg-left');
    var bodyHtml = '';
    if (type === 'text') {
        bodyHtml = '<div>' + escapeHtml(content) + '</div>';
    } else if (type === 'image') {
        bodyHtml = '<div class="msg-media"><img src="' + content + '" alt="photo" onclick="openLightbox(this.src)"></div>';
    } else if (type === 'video') {
        bodyHtml = '<div class="msg-media"><video src="' + content + '" controls playsinline></video></div>';
    } else if (type === 'file') {
        // content = {name, url, size}
        var sizeStr = content.size ? ' (' + Math.round(content.size/1024) + ' Ko)' : '';
        bodyHtml = '<div><a class="msg-file-link" href="' + content.url + '" download="' + escapeHtml(content.name) + '"><i class="fas fa-file-download"></i> ' + escapeHtml(content.name) + sizeStr + '</a></div>';
    }
    msgDiv.innerHTML = '<div class="msg-sender">' + (isOwn ? 'MOI' : escapeHtml(sender)) + '</div>' + bodyHtml + '<div class="msg-time">' + time + '</div>';
    messagesBox.appendChild(msgDiv);
    msgDiv.scrollIntoView({behavior:'smooth', block:'end'});
}

// ===================== MUTE MICRO =====================
function applyMicroMuteToStream(stream) {
    if (!stream) return;
    stream.getAudioTracks().forEach(track => { track.enabled = !microMuted; });
}
microMuteBtn.addEventListener('click', function() {
    microMuted = !microMuted;
    microMuteBtn.classList.toggle('active', microMuted);

    if (icon) icon.className = microMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone';

    if (localStream) applyMicroMuteToStream(localStream);
});

// ===================== HAUT-PARLEUR =====================
speakerLockBtn.addEventListener('click', function() {
    speakerMuted = !speakerMuted;
    speakerLockBtn.classList.toggle('active', speakerMuted);
    var icon = speakerLockBtn.querySelector('i');
    if (icon) icon.className = speakerMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
    var label = speakerLockBtn.querySelector('span');
    if (label) label.textContent = speakerMuted ? 'OFF' : 'HP';
    if (connections.length > 0) {
        var payload = { type: 'speaker-muted', muted: speakerMuted, senderId: myId };
        if (isHost) broadcast(payload);
        else if (connections[0] && connections[0].open) connections[0].send(payload);
    }
});

// ===================== FLIP CAMÉRA =====================
flipCameraBtn.addEventListener('click', async function() {
    if (!localStream) return;
    // Toggle facing mode
    currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
    try {
        // Stop existing video tracks
        localStream.getVideoTracks().forEach(t => t.stop());
        var newStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: { facingMode: currentFacingMode }
        });
        applyMicroMuteToStream(newStream);
        // Replace video track in all active calls
        var newVideoTrack = newStream.getVideoTracks()[0];
        Object.values(activeCalls).forEach(function(call) {
            if (call && call.peerConnection) {
                var sender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender && newVideoTrack) sender.replaceTrack(newVideoTrack);
            }
        });
        // Update local stream video
        localStream.getVideoTracks().forEach(t => localStream.removeTrack(t));
        localStream.addTrack(newVideoTrack);
        // Also keep audio from new stream in sync
        newStream.getAudioTracks().forEach(t => newStream.removeTrack(t));
        localVideo.srcObject = localStream;
    } catch(e) {
        statusEl.textContent = "FLIP CAMÉRA ERREUR";
        console.error(e);
    }
});

// ===================== VIDEO GRID MANAGEMENT =====================

// ===================== P2P DATA =====================
function broadcast(data, exceptConn) {
    connections.forEach(c => { if (c !== exceptConn && c.open) c.send(data); });
}

// ===================== CHUNKED TRANSFER =====================
// For large files: split into chunks to avoid P2P buffer overflow
var CHUNK_SIZE = 64 * 1024; // 64 KB chunks
var incomingChunks = {}; // key: transferId -> { chunks:[], total:0, meta:{} }

function sendFileInChunks(conn, arrayBuffer, meta) {
    return new Promise(function(resolve, reject) {
        var total = Math.ceil(arrayBuffer.byteLength / CHUNK_SIZE);
        var transferId = Date.now() + '_' + Math.random().toString(36).substr(2,6);

        // Send metadata first
        conn.send({ type: 'chunk-start', transferId: transferId, total: total, meta: meta });

        var idx = 0;
        function sendNext() {
            if (idx >= total) {
                conn.send({ type: 'chunk-end', transferId: transferId });
                resolve();
                return;
            }
            var start = idx * CHUNK_SIZE;
            var chunk = arrayBuffer.slice(start, start + CHUNK_SIZE);
            conn.send({ type: 'chunk-data', transferId: transferId, index: idx, data: chunk });
            idx++;
            // Small delay to avoid buffer overflow
            setTimeout(sendNext, 20);
        }
        sendNext();
    });
}

function broadcastFileInChunks(arrayBuffer, meta, exceptConn) {
    connections.forEach(function(c) {
        if (c !== exceptConn && c.open) {
            sendFileInChunks(c, arrayBuffer, meta);
        }
    });
}

function handleChunkStart(data) {
    incomingChunks[data.transferId] = {
        chunks: new Array(data.total),
        total: data.total,
        received: 0,
        meta: data.meta
    };
}

function handleChunkData(data) {
    var t = incomingChunks[data.transferId];
    if (!t) return;
    t.chunks[data.index] = data.data;
    t.received++;
}

function handleChunkEnd(data, fromConn) {
    var t = incomingChunks[data.transferId];
    if (!t) return;
    delete incomingChunks[data.transferId];

    // Reassemble
    var totalSize = t.chunks.reduce(function(acc, c) { return acc + (c ? c.byteLength : 0); }, 0);
    var combined = new Uint8Array(totalSize);
    var offset = 0;
    t.chunks.forEach(function(chunk) {
        if (chunk) {
            combined.set(new Uint8Array(chunk), offset);
            offset += chunk.byteLength;
        }
    });

    var meta = t.meta;
    var blob = new Blob([combined], {type: meta.mimeType || 'application/octet-stream'});
    var url = URL.createObjectURL(blob);
    var sender = meta.senderId ? meta.senderId.substring(0,10) : '?';

    if (meta.fileType === 'image') {
        addMessageToChat(url, sender, false, 'image');
    } else if (meta.fileType === 'video') {
        addMessageToChat(url, sender, false, 'video');
    } else {
        addMessageToChat({name: meta.fileName, url: url, size: totalSize}, sender, false, 'file');
    }
    playSmsReceived();

    // Relay if host (forward raw chunks - re-broadcast assembled as single send for simplicity)
    if (isHost && fromConn) {
        broadcastFileInChunks(combined.buffer, meta, fromConn);
    }
}

function addConnection(conn) {
    if (connections.find(c => c.peer === conn.peer)) return;
    connections.push(conn);
    updateList();
    statusEl.textContent = connections.length + " CONNECTÉ" + (connections.length > 1 ? "S" : "");

    conn.on('data', function(data) {
        // Audio talkie
        if (data.type === 'audio' && data.blob) {
            if (!speakerMuted) {
                var blob = new Blob([data.blob], {type:'audio/webm'});
                new Audio(URL.createObjectURL(blob)).play();
            }
            if (isHost) broadcast(data, conn);
        }
        // Text message
        else if (data.type === 'text' && data.text) {
            addMessageToChat(data.text, data.senderId ? data.senderId.substring(0,10) : "?", false);
            playSmsReceived();
            if (isHost) broadcast(data, conn);
        }
        // Chunked transfer protocol
        else if (data.type === 'chunk-start') {
            handleChunkStart(data);
        }
        else if (data.type === 'chunk-data') {
            handleChunkData(data);
        }
        else if (data.type === 'chunk-end') {
            handleChunkEnd(data, conn);
        }
        // Speaker mute notification
        else if (data.type === 'speaker-muted') {
            var who = data.senderId ? data.senderId.substring(0,10) : "?";
            var msg = data.muted ? '[' + who + '] Talkie coupé' : '[' + who + '] Talkie actif';
            addMessageToChat(msg, "SYS", false);
            if (isHost) broadcast(data, conn);
        }
    });

    conn.on('close', function() {
        connections = connections.filter(c => c !== conn);
        updateList();
        statusEl.textContent = connections.length ? connections.length + " CONNECTÉ(S)" : "SEUL";
    });
}

// ===================== REJOINDRE =====================
function joinRoom() {
    var room = document.getElementById('roomName').value.trim();
    if (!room) { statusEl.textContent = "ENTRER UN CODE"; return; }
    if (peer) {
        connections.forEach(c => { try { c.close(); } catch(e){} });
        peer.destroy(); connections = [];
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    }
    statusEl.textContent = "CONNEXION...";
    peer = new Peer(room, {
        debug: 0,
        config: { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] }
    });
    peer.on('open', function(id) { myId = id; isHost = true; statusEl.textContent = 'HÔTE · "' + room + '"'; updateList(); });
    peer.on('connection', function(conn) { addConnection(conn); });
    peer.on('call', function(call) { handleIncomingCall(call); });
    peer.on('error', function(err) {
        if (err.type === 'unavailable-id') {
            statusEl.textContent = "CODE PRIS › CLIENT";
            var clientId = room + '_' + Math.random().toString(36).substr(2,6);
            var newPeer = new Peer(clientId, { debug: 0, config: { iceServers: [{ urls:"stun:stun.l.google.com:19302" }] } });
            newPeer.on('open', function(id) {
                myId = id; isHost = false;
                var connToHost = newPeer.connect(room);
                addConnection(connToHost);
                statusEl.textContent = 'CLIENT · "' + room + '"';
                peer = newPeer;
            });
            newPeer.on('call', function(call) { handleIncomingCall(call); });
            newPeer.on('error', function() { statusEl.textContent = "ERREUR CONNEXION"; });
            peer = newPeer;
        } else { statusEl.textContent = "ERR · " + err.type; }
    });
}

// ===================== TALKIE-WALKIE =====================
async function startTalking() {
    if (microMuted) { statusEl.textContent = "MICRO MUET"; return; }
    if (connections.length === 0) { statusEl.textContent = "PERSONNE CONNECTÉ"; return; }
    if (!localStream || !localStream.getAudioTracks().length) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({audio: true});
            applyMicroMuteToStream(localStream);
        } catch(e) { statusEl.textContent = "MICRO INACCESSIBLE"; return; }
    }
    audioChunks = [];
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    mediaRecorder = new MediaRecorder(localStream, {mimeType:'audio/webm'});
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    startTimer();
    talkBtn.classList.add('pressing');
    playTalkieStart();
}
function stopTalking() {
    if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
    mediaRecorder.onstop = function() {
        if (audioChunks.length === 0) return;
        var blob = new Blob(audioChunks, {type:'audio/webm'});
        connections.forEach(conn => { if (conn.open) conn.send({type:'audio', blob:blob}); });
        statusEl.textContent = "ENVOYÉ ✓";
        playTalkieEnd();
        setTimeout(() => { statusEl.textContent = connections.length ? connections.length + " CONNECTÉ(S)" : "SEUL"; }, 800);
    };
    mediaRecorder.stop();
    stopTimer();
    talkBtn.classList.remove('pressing');
}
var pressing = false;
function onPress(e) { e.preventDefault(); if (!pressing) { pressing = true; startTalking(); } }
function onRelease(e) { e.preventDefault(); if (pressing) { pressing = false; stopTalking(); } }
talkBtn.addEventListener('pointerdown', onPress);
talkBtn.addEventListener('pointerup', onRelease);
talkBtn.addEventListener('pointerleave', onRelease);
talkBtn.addEventListener('pointercancel', onRelease);

// ===================== APPEL / VISIO MULTI =====================
async function startCall(withVideo) {
    if (connections.length === 0) { statusEl.textContent = "PERSONNE CONNECTÉ"; return; }

    // If already in call, clicking again hangs up
    if (Object.keys(activeCalls).length > 0) {
        hangupAllCalls();
        return;
    }

    isVideoCall = withVideo;
    try {
        var stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: withVideo ? { facingMode: currentFacingMode } : false
        });
        localStream = stream;
        applyMicroMuteToStream(localStream);

        if (withVideo) {
            localVideo.srcObject = stream;
            videoPanel.style.display = 'block';
        }

        // Call all connected peers (up to max)
        var targets = connections.slice(0, MAX_VIDEO_PARTICIPANTS);
        targets.forEach(function(conn) {
            var call = peer.call(conn.peer, stream, { metadata: { video: withVideo } });
            activeCalls[conn.peer] = call;
            setupCallHandlers(call, withVideo, conn.peer);
        });

        statusEl.textContent = withVideo ? "VISIO EN COURS…" : "APPEL EN COURS…";
    } catch(e) {
        statusEl.textContent = "CAM/MICRO INACCESSIBLE";
        console.error(e);
    }
}

function handleIncomingCall(call) {
    // Check if we are already at max
    if (Object.keys(activeCalls).length >= MAX_VIDEO_PARTICIPANTS) {
        call.close();
        return;
    }
    pendingCall = call;
    var isVideo = (call.metadata && call.metadata.video) || false;
    isVideoCall = isVideo;
    callPopupTitle.textContent = isVideo ? "VISIO ENTRANT" : "APPEL ENTRANT";
    callPopupSender.textContent = "DE : " + call.peer.substring(0,14);
    callPopup.classList.add('open');
    playCallRing();
}

callAcceptBtn.addEventListener('click', async function() {
    callPopup.classList.remove('open');
    if (!pendingCall) return;
    var call = pendingCall; pendingCall = null;
    try {
        // Reuse localStream if already active in call
        if (!localStream) {
            var stream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: isVideoCall ? { facingMode: currentFacingMode } : false
            });
            localStream = stream;
            applyMicroMuteToStream(localStream);
        }
        call.answer(localStream);
        activeCalls[call.peer] = call;
        setupCallHandlers(call, isVideoCall, call.peer);
        statusEl.textContent = "EN COMMUNICATION";
        if (isVideoCall) {
            localVideo.srcObject = localStream;
            videoPanel.style.display = 'block';
        }
    } catch(e) {
        statusEl.textContent = "MICRO/CAM INACCESSIBLE";
        console.error(e);
    }
});

callRejectBtn.addEventListener('click', function() {
    callPopup.classList.remove('open');
    if (pendingCall) { pendingCall.close(); pendingCall = null; }
});

function setupCallHandlers(call, withVideo, peerId) {
    call.on('stream', function(remoteStream) {
        if (withVideo) {
            addRemoteVideoStream(peerId, remoteStream);
            if (localStream) localVideo.srcObject = localStream;
            videoPanel.style.display = 'block';
        } else {
            // Audio only: play in audio element
            var audio = new Audio();
            audio.srcObject = remoteStream;
            audio.autoplay = true;
            audio.id = 'audio-' + peerId.replace(/[^a-zA-Z0-9]/g,'_');
            document.body.appendChild(audio);
        }
        statusEl.textContent = withVideo ? "VISIO ACTIVE" : "EN COMMUNICATION";
    });
    call.on('close', function() { cleanupCall(peerId, withVideo); });
    call.on('error', function() { cleanupCall(peerId, withVideo); statusEl.textContent = "ERREUR APPEL"; });
}

function hangupAllCalls() {
    Object.keys(activeCalls).forEach(function(pid) {
        try { activeCalls[pid].close(); } catch(e){}
        cleanupCall(pid, isVideoCall);
    });
}

function cleanupCall(peerId, withVideo) {
    delete activeCalls[peerId];
    if (withVideo) removeRemoteVideo(peerId);

    // Remove audio element if any
    var audioEl = document.getElementById('audio-' + (peerId||'').replace(/[^a-zA-Z0-9]/g,'_'));
    if (audioEl) audioEl.remove();

    // If no more calls active, cleanup
    if (Object.keys(activeCalls).length === 0) {
        videoPanel.style.display = 'none';
        remoteVideosGrid.innerHTML = '';
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        statusEl.textContent = connections.length ? connections.length + " CONNECTÉ(S)" : "SEUL";
    } else {
        updateVideoGrid();
    }
}

callAudioBtn.addEventListener('click', function() { startCall(false); });
callVideoBtn.addEventListener('click', function() { startCall(true); });

// ===================== MESSAGERIE =====================
function sendTextMessage(content) {
    if (!content.trim()) return;
    if (connections.length === 0) { addMessageToChat("Personne connectée", "SYS"); return; }
    addMessageToChat(content, myId.substring(0,10), true);
    playSmsSent();
    var payload = { type:'text', text:content, senderId:myId, timestamp:Date.now() };
    if (isHost) broadcast(payload);
    else if (connections[0] && connections[0].open) connections[0].send(payload);
}
function handleSendSms() { var msg = smsInput.value.trim(); if (msg) { sendTextMessage(msg); smsInput.value = ""; } }
sendSmsBtn.addEventListener('click', handleSendSms);
smsInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); handleSendSms(); } });

mediaPickerBtn.addEventListener('click', function() { if (!isSending) fileInput.click(); });

fileInput.addEventListener('change', async function() {
    var file = fileInput.files[0];
    if (!file) return;
    if (connections.length === 0) { addMessageToChat("Personne connectée", "SYS"); return; }
    if (isSending) { addMessageToChat("Envoi en cours, patientez...", "SYS", true); fileInput.value=''; return; }

    var MAX_SIZE = 20 * 1024 * 1024; // 20 MB max
    if (file.size > MAX_SIZE) {
        addMessageToChat("Fichier trop lourd (max 20 Mo)", "SYS", true);
        fileInput.value = '';
        return;
    }

    isSending = true;
    uploadProgress.style.display = 'block';
    uploadProgress.textContent = 'Envoi en cours…';

    try {
        var isImage = file.type.startsWith('image/');
        var isVideo = file.type.startsWith('video/');
        var fileType = isImage ? 'image' : (isVideo ? 'video' : 'file');

        // For images: compress before sending to avoid buffer issues
        if (isImage) {
            var compressedUrl = await compressImage(file, 1200, 0.75);
            // Convert data URL back to ArrayBuffer
            var base64 = compressedUrl.split(',')[1];
            var binary = atob(base64);
            var ab = new ArrayBuffer(binary.length);
            var view = new Uint8Array(ab);
            for (var i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);

            // Show locally (use compressed)
            addMessageToChat(compressedUrl, myId.substring(0,10), true, 'image');
            playSmsSent();

            var meta = { fileType: 'image', mimeType: 'image/jpeg', senderId: myId, fileName: file.name };
            if (isHost) {
                broadcastFileInChunks(ab, meta, null);
            } else if (connections[0] && connections[0].open) {
                await sendFileInChunks(connections[0], ab, meta);
            }
        } else {
            // Video or file: read as ArrayBuffer and chunk it
            var ab = await readFileAsArrayBuffer(file);
            var meta = {
                fileType: fileType,
                mimeType: file.type || 'application/octet-stream',
                senderId: myId,
                fileName: file.name
            };

            if (isVideo) {
                // Show locally
                var localUrl = URL.createObjectURL(file);
                addMessageToChat(localUrl, myId.substring(0,10), true, 'video');
            } else {
                var localUrl = URL.createObjectURL(file);
                addMessageToChat({name: file.name, url: localUrl, size: file.size}, myId.substring(0,10), true, 'file');
            }
            playSmsSent();

            if (isHost) {
                broadcastFileInChunks(ab, meta, null);
            } else if (connections[0] && connections[0].open) {
                await sendFileInChunks(connections[0], ab, meta);
            }
        }
    } catch(e) {
        addMessageToChat("Erreur envoi fichier", "SYS", true);
        console.error(e);
    } finally {
        isSending = false;
        uploadProgress.style.display = 'none';
        fileInput.value = '';
    }
});

function readFileAsArrayBuffer(file) {
    return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve(e.target.result); };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function compressImage(file, maxWidth, quality) {
    return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var canvas = document.createElement('canvas');
                var w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

window.joinRoom = joinRoom;
window.openLightbox = openLightbox;
window.addEventListener('beforeunload', function() {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (peer) peer.destroy();
});
